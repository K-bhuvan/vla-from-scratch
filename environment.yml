# Conda environment for the VLA training project.
# Create with: conda env create -f environment.yml
# Activate with: conda activate vla
#
# Each dependency is annotated so you know WHY it is here.
#
# GPU note: RTX 5060 Ti is Blackwell architecture (sm_120).
# PyTorch must come from the pip nightly wheel index (cu128) because:
#   - pytorch conda channel does not ship pytorch-cuda=12.6/12.8 yet
#   - cu128 nightly is confirmed working on this machine

name: vla

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Core Python ──────────────────────────────────────────────────────────
  - python=3.11

  # ── Tensor utilities ─────────────────────────────────────────────────────
  - numpy=1.26.*         # array math; PyTorch interops with numpy arrays

  # ── pip-installed packages ────────────────────────────────────────────────
  - pip
  - pip:
    # ── PyTorch (Blackwell / sm_120 support via CUDA 12.8 nightly wheels) ───
    # RTX 5060 Ti = Blackwell (sm_120). Stable pytorch conda packages don't
    # include sm_120 kernels yet. The cu128 pip nightly wheel is confirmed
    # working on this machine (same source as llm_gpu env, separate vla env).
    - --extra-index-url https://download.pytorch.org/whl/nightly/cu128
    - torch==2.12.0.dev20260316+cu128
    - torchvision==0.26.0.dev20260316+cu128

    # ── Readable tensor reshaping ─────────────────────────────────────────
    # You will use this a LOT when implementing multi-head attention and
    # patch embeddings.
    - einops==0.8.0

    # Config management. Instead of passing 20 CLI args, everything lives in
    # a clean YAML file. Used in every training script.
    - hydra-core==1.3.2
    - omegaconf==2.3.0

    # Experiment tracking. Logs losses, images, and metrics to a dashboard.
    # Free for personal use. You can also use tensorboard if you prefer offline.
    - wandb==0.17.0

    # Progress bars and pretty console output — makes training logs readable.
    - tqdm==4.66.4
    - rich==13.7.1

    # Image loading/processing in Python.
    - Pillow==10.3.0

    # HDF5 file format — the standard way to store large trajectory datasets
    # (observations, actions, rewards) on disk efficiently.
    - h5py==3.11.0

    # Plotting — for loss curves, attention maps, and analysis notebooks.
    - matplotlib==3.9.0

    # Jupyter notebooks for analysis and visualization steps.
    - notebook==7.2.0
    - ipywidgets==8.1.3
